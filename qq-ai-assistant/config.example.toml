# cc-connect 配置文件示例
# 复制为 config.toml 并填入你的信息
# 完整配置说明: https://github.com/chenhg5/cc-connect

language = "zh"

[log]
level = "info"

[display]
mode = "quiet"
thinking_messages = false
tool_messages = false

[[projects]]
name = "default"
admin_from = "你的QQ号"

[projects.agent]
type = "claudecode"

[projects.agent.options]
work_dir = "你的工作目录路径"
mode = "acceptEdits"
system_prompt = "你的AI助手人设和系统提示词"

[[projects.platforms]]
type = "qq"

[projects.platforms.options]
ws_url = "ws://127.0.0.1:3001"
token = ""
allow_from = "允许使用的QQ号,多个用逗号分隔"
